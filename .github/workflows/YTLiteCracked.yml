name: Build YTLitePlusEXTRA IPA with YTLite Cracked 

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "URL to the decrypted IPA file"
        default: ""
        required: true
        type: string

      display_name:
        description: "App Name (Optional)"
        default: "YouTube"
        required: true
        type: string

      bundle_id:
        description: "Bundle ID (Optional)"
        default: "com.google.ios.youtube"
        required: true
        type: string

      all_tweaks:
        description: "Build all tweaks (turn off to use the selections below)"
        default: true
        required: false
        type: boolean

      youpip:
        description: "Select YouPiP"
        default: false
        type: boolean

      ytuhd:
        description: "Select YTUHD"
        default: false
        type: boolean

      ryd:
        description: "Select Return YouTube Dislikes"
        default: false
        type: boolean

      yougroupsettings:
        description: "Select YouGroupSettings"
        default: false
        type: boolean

      ytvideooverlay:
        description: "Select YTVideoOverlay"
        default: false
        type: boolean

      ytabconfig:
        description: "Select YTABConfig"
        default: false
        type: boolean

      youquality:
        description: "Select YouQuality"
        default: false
        type: boolean

      youspeed:
        description: "Select YouSpeed"
        default: false
        type: boolean

      demc:
        description: "Select DontEatMyContent"
        default: false
        type: boolean

      youmute:
        description: "Select YouMute"
        default: false
        type: boolean

      youloop:
        description: "Select YouLoop"
        default: false
        type: boolean

      alderis:
        description: "Select Alderis"
        default: false
        type: boolean

      youslider:
        description: "Select YouSlider"
        default: false
        type: boolean

      youchoosequality:
        description: "Select YouChooseQuality"
        default: false
        type: boolean

      ytsilentvote:
        description: "Select YTSilentVote"
        default: false
        type: boolean

      youshare:
        description: "Select YouShare"
        default: false
        type: boolean

      gonerino:
        description: "Select Gonerino"
        default: false
        type: boolean

      ytweaks:
        description: "Select YTweaks"
        default: false
        type: boolean

      yougetcaption:
        description: "Select YouGetCaption"
        default: false
        type: boolean

      ytflags:
        description: "Select YTFlags"
        default: false
        type: boolean

      iamyoutube:
        description: "Select IAmYouTube"
        default: false
        type: boolean


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build YTLitePlusEXTRA IPA (YTLite v5.2.1) Cracked
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Hide Sensitive Inputs
        uses: levibostian/action-hide-sensitive-inputs@v1
        with:
          exclude_inputs: bundle_id,display_name,ytlite_version,demc,ytvid

      - name: Download and Validate IPA
        run: |
          wget "${{ inputs.ipa_url }}" --quiet --no-verbose -O youtube.ipa

          file_type=$(file --mime-type -b youtube.ipa)

          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Validation failed: The downloaded file is not a valid IPA. Detected type: $file_type."
            exit 1
          fi

      - name: Get YouTube Version
        run: |
          unzip -q youtube.ipa -d ytextracted
          echo "YT_VERSION=$(grep -A 1 '<key>CFBundleVersion</key>' ytextracted/Payload/YouTube.app/Info.plist | grep '<string>' | awk -F'[><]' '{print $3}')" >> $GITHUB_ENV

      - name: Install Dependencies
        run: brew install make ldid swiftlint meson ninja pkg-config nasm

      - name: Set PATH Environment Variables
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: Clone Theos
        run: git clone --quiet --depth=1 --recurse-submodules https://github.com/theos/theos.git

      - name: Download iOS SDK
        run: |
          git clone --quiet --depth=1 -n --filter=tree:0 https://github.com/Tonwalter888/iOS-SDKs.git
          cd iOS-SDKs
          git sparse-checkout set --no-cone iPhoneOS18.6.sdk
          git checkout
          mv *.sdk $THEOS/sdks

      - name: Add Preferences private framework stub
        if: ${{ inputs.all_tweaks || inputs.alderis }}
        run: |
          git clone --quiet --depth=1 -n --filter=tree:0 https://github.com/chrisharper22/sdks.git patched-sdks
          cd patched-sdks
          git sparse-checkout set --no-cone iPhoneOS16.2.sdk/System/Library/PrivateFrameworks/Preferences.framework
          git checkout

          stub="iPhoneOS16.2.sdk/System/Library/PrivateFrameworks/Preferences.framework"
          sdk="$THEOS/sdks/iPhoneOS18.6.sdk/System/Library"

          # The patched stub contains `platform: (null)`, which modern TAPI
          # rejects as malformed. Normalize it before installing the copies.
          sed -i '' 's/platform:[[:space:]]*(null)/platform: ios/' "$stub/Preferences.tbd"
          if grep -q '(null)' "$stub/Preferences.tbd"; then
            echo "::error::Preferences.tbd still contains an invalid platform"
            exit 1
          fi

          # Alderis's legacy lcpshim declares Preferences as a regular
          # framework, so ld only searches System/Library/Frameworks.
          mkdir -p "$sdk/Frameworks" "$sdk/PrivateFrameworks"
          cp -R "$stub" "$sdk/Frameworks/"
          cp -R "$stub" "$sdk/PrivateFrameworks/"
          test -f "$sdk/Frameworks/Preferences.framework/Preferences.tbd"

      - name: Install cyan and tbd
        run: |
          pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          wget --quiet --no-verbose "https://github.com/inoahdev/tbd/releases/download/2.2/tbd-mac" -O /usr/local/bin/tbd
          chmod +x /usr/local/bin/tbd

      - name: Download YTLite .deb
        run: wget "https://files.catbox.moe/l2pfst.deb" --quiet --no-verbose -O ytlite.deb

      - name: Clone Open in YouTube (Safari Extension)
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/BillyCurtis/OpenYouTubeSafariExtension.git
          cd OpenYouTubeSafariExtension
          git sparse-checkout set --no-cone OpenYouTubeSafariExtension.appex
          git checkout
          mv *.appex ${{ github.workspace }}

      - name: Clone YouTubeHeader
        run: |
           git clone --quiet --depth=1 https://github.com/PoomSmart/YouTubeHeader.git $THEOS/include/YouTubeHeader
           if [ "${{ inputs.all_tweaks }}" = "true" ] || [ "${{ inputs.demc }}" = "true" ]; then
            cp -r "$THEOS/include/YouTubeHeader" "$THEOS/include/YTHeaders"
           fi

      - name: Clone PSHeader
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/PSHeader.git $THEOS/include/PSHeader

      - name: Clone YouPiP
        if: ${{ inputs.all_tweaks || inputs.youpip }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouPiP.git
    
      - name: Clone YTUHD (with submodules)
        if: ${{ inputs.all_tweaks || inputs.ytuhd }}
        run: git clone --quiet --depth=1 --recurse-submodules --shallow-submodules https://github.com/PoomSmart/YTUHD.git
           
      - name: Clone Return-YouTube-Dislikes
        if: ${{ inputs.all_tweaks || inputs.ryd }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/Return-YouTube-Dislikes.git

      - name: Clone YouGroupSettings
        if: ${{ inputs.all_tweaks || inputs.yougroupsettings }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouGroupSettings.git
           
      - name: Clone YTVideoOverlay
        if: ${{ inputs.all_tweaks || inputs.ytvideooverlay }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTVideoOverlay.git
          
      - name: Clone YTABConfig
        if: ${{ inputs.all_tweaks || inputs.ytabconfig }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTABConfig.git
                  
      - name: Clone YouQuality
        if: ${{ inputs.all_tweaks || inputs.youquality }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouQuality.git

      - name: Clone YouSpeed
        if: ${{ inputs.all_tweaks || inputs.youspeed }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouSpeed.git

      - name: Clone DontEatMyContent
        if: ${{ inputs.all_tweaks || inputs.demc }}
        run: git clone --quiet --depth=1 https://github.com/therealFoxster/DontEatMyContent.git

      - name: Clone YouMute
        if: ${{ inputs.all_tweaks || inputs.youmute }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouMute.git
    
      - name: Clone YouLoop
        if: ${{ inputs.all_tweaks || inputs.youloop }}
        run: git clone --quiet --depth=1 https://github.com/bhackel/YouLoop.git

      - name: Clone Alderis
        if: ${{ inputs.all_tweaks || inputs.alderis }}
        run: git clone --quiet --depth=1 https://github.com/hbang/Alderis.git

      - name: Clone YouSlider
        if: ${{ inputs.all_tweaks || inputs.youslider }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouSlider.git

      - name: Clone YouChooseQuality
        if: ${{ inputs.all_tweaks || inputs.youchoosequality }}
        run: git clone --quiet https://github.com/PoomSmart/YouChooseQuality.git

      - name: Clone YTSilentVote
        if: ${{ inputs.all_tweaks || inputs.ytsilentvote }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTSilentVote.git

      - name: Clone YouShare
        if: ${{ inputs.all_tweaks || inputs.youshare }}
        run: git clone --quiet --depth=1 https://github.com/Tonwalter888/YouShare.git

      - name: Clone Gonerino
        if: ${{ inputs.all_tweaks || inputs.gonerino }}
        run: git clone --quiet --depth=1 https://github.com/castdrian/Gonerino.git

      - name: Clone YTweaks
        if: ${{ inputs.all_tweaks || inputs.ytweaks }}
        run: git clone --quiet --depth=1 https://github.com/fosterbarnes/YTweaks.git

      - name: Clone YouGetCaption
        if: ${{ inputs.all_tweaks || inputs.yougetcaption }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouGetCaption.git
        
      - name: Clone YTFlags
        if: ${{ inputs.all_tweaks || inputs.ytflags }}
        run: git clone --quiet --depth=1 https://github.com/Tonwalter888/YTFlags.git

      - name: Clone IAmYouTube
        if: ${{ inputs.all_tweaks || inputs.iamyoutube }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/IAmYouTube.git

      - name: Clone and build YTPlaybackFix
        run: |
            git clone --quiet --depth=1 https://github.com/Mark02-2012/YTPlaybackFix
            cd YTPlaybackFix && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
            mv packages/*.deb ${{ github.workspace }}/ytplaybackfix.deb

      - name: Build YouPiP
        if: ${{ inputs.all_tweaks || inputs.youpip }}
        run: |
          cd YouPiP
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youpip.deb    


      - name: Build YTUHD
        if: ${{ inputs.all_tweaks || inputs.ytuhd }}
        run: |
          cd YTUHD
          git submodule sync --recursive
          git submodule update --init --recursive
          make libvpx
          make dav1d
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless SIDELOAD=1
          mv packages/*.deb ${{ github.workspace }}/YTUHD.deb

      - name: Build Return-YouTube-Dislikes
        if: ${{ inputs.all_tweaks || inputs.ryd }}
        run: |
          cd Return-YouTube-Dislikes
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ryd.deb

      - name: Build YouGroupSettings
        if: ${{ inputs.all_tweaks || inputs.yougroupsettings }}
        run: |
          cd YouGroupSettings
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ygs.deb

      - name: Build YTVideoOverlay
        if: ${{ inputs.all_tweaks || inputs.ytvideooverlay }}
        run: |
          cd YTVideoOverlay
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytvo.deb

      - name: Build YTABConfig
        if: ${{ inputs.all_tweaks || inputs.ytabconfig }}
        run: |
          cd YTABConfig
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytabconfig.deb

      - name: Build YouQuality
        if: ${{ inputs.all_tweaks || inputs.youquality }}
        run: |
          cd YouQuality
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youquality.deb

      - name: Build YouSpeed
        if: ${{ inputs.all_tweaks || inputs.youspeed }}
        run: |
          cd YouSpeed
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youspeed.deb

      - name: Build DontEatMyContent
        if: ${{ inputs.all_tweaks || inputs.demc }}
        run: |
          cd DontEatMyContent
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/demc.deb

      - name: Build YouMute
        if: ${{ inputs.all_tweaks || inputs.youmute }}
        run: |
          cd YouMute
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ym.deb

      - name: Build YouLoop
        if: ${{ inputs.all_tweaks || inputs.youloop }}
        run: |
          cd YouLoop
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youloop.deb

      - name: Build YouSlider
        if: ${{ inputs.all_tweaks || inputs.youslider }}
        run: |
          cd YouSlider
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youslider.deb

      - name: ${{ (inputs.all_tweaks || inputs.alderis) && 'Build Alderis' || 'Skip Alderis (not selected)' }}
        if: ${{ inputs.all_tweaks || inputs.alderis }}
        run: |
          cd Alderis
          make clean

          # lcpshim only searches its local staged Frameworks directory.
          # Populate it after `make clean`, which removes the .theos tree.
          frameworks="$PWD/.theos/obj/install/Library/Frameworks"
          mkdir -p "$frameworks"
          cp -R "$THEOS/sdks/iPhoneOS18.6.sdk/System/Library/Frameworks/Preferences.framework" "$frameworks/"
          test -f "$frameworks/Preferences.framework/Preferences.tbd"

          make package DEBUG=0 FINALPACKAGE=1 ARCHS=arm64
          mv packages/*.deb ${{ github.workspace }}/alderis.deb

      - name: Build YouChooseQuality
        if: ${{ inputs.all_tweaks || inputs.youchoosequality }}
        run: |
          cd YouChooseQuality
          git checkout 1585a3691b2ef0b59d42c40c31639fd8b79e2cd4

          # Current Logos drops the property access from `%orig.mutableCopy`,
          # producing an invalid NSArray-to-NSMutableArray assignment.
          sed -i '' 's/%orig\.mutableCopy/[%orig mutableCopy]/' Settings.x
          grep -Fq 'NSMutableArray *mutableCategories = [%orig mutableCopy];' Settings.x

          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youchoose.deb

      - name: Build YTSilentVote
        if: ${{ inputs.all_tweaks || inputs.ytsilentvote }}
        run: |
          cd YTSilentVote
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytnovote.deb  

      - name: Build YouShare
        if: ${{ inputs.all_tweaks || inputs.youshare }}
        run: |
          cd YouShare
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youshare.deb
          
      - name: Build Gonerino
        if: ${{ inputs.all_tweaks || inputs.gonerino }}
        run: |
          cd Gonerino
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/gonerino.deb

      - name: Build YouGetCaption
        if: ${{ inputs.all_tweaks || inputs.yougetcaption }}
        run: |
          cd YouGetCaption
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ygc.deb

      - name: Build YTweaks
        if: ${{ inputs.all_tweaks || inputs.ytweaks }}
        run: |
          cd YTweaks
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytweaks.deb

      - name: Build YTFlags
        if: ${{ inputs.all_tweaks || inputs.ytflags }}
        run: |
          cd YTFlags
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytflags.deb

      - name: Build IAmYouTube
        if: ${{ inputs.all_tweaks || inputs.iamyoutube }}
        run: |
          cd IAmYouTube
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/imyt.deb

      - name: Inject Tweaks Into IPA
        run: |
          tweaks="OpenYouTubeSafariExtension.appex"

          for f in *.deb; do
            tweaks="$tweaks $f"
          done

          cyan -i youtube.ipa -o YTLitePlusEXTRA_${{ env.YT_VERSION }}_v5.2.1_cracked.ipa -uwef $tweaks -n "${{ inputs.display_name }}" -b ${{ inputs.bundle_id }}

      - name: Create a Draft Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ytliteplusextra_ytlitecracked-ipa${{ github.run_number }}
          name: YTLitePlusEXTRA_${{ env.YT_VERSION }}_v5.2.1_cracked
          files: YTLitePlusEXTRA_${{ env.YT_VERSION }}_v5.2.1_cracked.ipa
          draft: true

      - name: Job Summary - Build Complete
        run: |
          echo -e '### 🛠️ Build YTLitePlusEXTRA IPA Complete!' >> $GITHUB_STEP_SUMMARY

      - name: Job Summary - Output the Draft Release Link
        run: |
          echo -e '### 🚀 Draft Release\n\nDraft release has been created successfully! You can view your release here: https://github.com/${{ github.repository }}/releases' >> $GITHUB_STEP_SUMMARY

      - name: Job Summary - Cleanup
        run: |
          echo -e '### 🧹 Cleanup\n\nYou can remove previous GitHub Actions run here: https://github.com/${{ github.repository }}/actions/workflows/delete-old-workflows-run.yml And if you want to delelte old draft releases you have then here: https://github.com/${{ github.repository }}/actions/workflows/delete-old-draft-releases.yml' >> $GITHUB_STEP_SUMMARY
